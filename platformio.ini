; SmartPID CUBE — Beer Distillation Controller
; Dual-processor: ATSAMD21G18 (main controller) + ESP-WROOM-02 (WiFi)

; ─── DIAGNOSTIC: Pin Scanner for SAMD21 ─────────────────────────────────────
; Flash this first to map out all GPIO pins before writing real firmware
[env:samd21_diag]
platform = atmelsam
board = zeroUSB
framework = arduino
build_src_filter = -<*> +<../diag/>
monitor_speed = 115200
lib_deps =
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0

; SmartPID CUBE has a 16KB MSD bootloader (0x0000–0x3FFF)
; Application starts at 0x4000, not 0x2000 like standard Arduino Zero
board_upload.offset_address = 0x4000
board_upload.maximum_size = 245760
board_build.ldscript = flash_with_16kb_bootloader.ld

; Use native USB port for upload + serial
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

; ─── PRODUCTION: Distillation Controller for SAMD21 ──────────────────────────
[env:samd21_still]
platform = atmelsam
board = zeroUSB
framework = arduino
build_src_filter = +<*>
monitor_speed = 115200

; SmartPID CUBE 16KB MSD bootloader (app at 0x4000)
board_upload.offset_address = 0x4000
board_upload.maximum_size = 245760
board_build.ldscript = flash_with_16kb_bootloader.ld

upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

lib_deps =
    paulstoffregen/OneWire@^2.3.8
    milesburton/DallasTemperature@^3.11.0
    cmaglie/FlashStorage@^1.0.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.5
    adafruit/Adafruit BusIO@^1.14.1
